name: Bug Report
description: Report a bug or unexpected behaviour in portview
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below so we can
        reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug or unexpected behaviour.
      placeholder: When I run `portview -p 8080`, the output shows...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands and steps to trigger the bug.
      placeholder: |
        1. Run `portview -a`
        2. Observe the output
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What you expected to happen instead.
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Terminal output
      description: >
        Paste the terminal output showing the issue. Use `portview --full` for
        extra detail.
      render: text

  - type: input
    id: version
    attributes:
      label: portview version
      description: Output of `portview --version`.
      placeholder: portview 0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Ubuntu / Debian
        - Fedora / RHEL
        - Arch Linux
        - macOS
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: privilege
    attributes:
      label: Running with elevated privileges?
      options:
        - "No"
        - "Yes (sudo / Administrator)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (screenshots, Docker setup, etc.).
