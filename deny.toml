# PortLens - cargo-deny configuration
# Audits dependencies for security vulnerabilities, license issues, and bans.
# Run: cargo deny check
# Install: cargo install cargo-deny

[advisories]
# Warn only when a direct workspace dependency is unmaintained.
# Vulnerabilities, yanked crates, and notices are denied by default in cargo-deny 0.19+.
unmaintained = "workspace"
ignore = []

[licenses]
# Only allow these licenses — anything unlisted is denied by default.
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
]

[[licenses.clarify]]
name = "unicode-ident"
expression = "(MIT OR Apache-2.0) AND Unicode-DFS-2016"
license-files = [{ path = "LICENSE-UNICODE", hash = 0x3fb01745 }]

[bans]
# Deny duplicate versions of the same crate (keeps binary small)
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

# No known transitive duplicates yet — add skip entries here as needed.
skip = []

# Ban known-problematic crates
deny = [
    # openssl — we don't need it and it's a security liability
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
]

[sources]
# Only allow crates from crates.io — no random git repos
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
